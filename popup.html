<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB 社團篩選器</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <!-- 標題區 -->
        <header class="header">
            <div class="header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z" />
                </svg>
            </div>
            <h1>FB 社團篩選器</h1>
            <p class="subtitle">只看你想看的</p>
        </header>

        <!-- 新增社團 -->
        <div class="add-section">
            <div class="input-group">
                <input type="text" id="groupUrl" placeholder="貼上 Facebook 社團網址..." autocomplete="off">
                <button id="addBtn" class="btn btn-primary" title="新增社團">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                </button>
            </div>
            <div id="errorMsg" class="error-msg" style="display:none;"></div>
        </div>

        <!-- 主要按鈕：前往社團動態 -->
        <div class="main-action">
            <button id="goFeedBtn" class="btn btn-hero" title="前往社團動態（已篩選＋時間排序）">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z" />
                </svg>
                📋 前往社團動態（已篩選）
            </button>
        </div>

        <!-- 功能按鈕列 -->
        <div class="action-bar">
            <button id="openAllBtn" class="btn btn-action" title="開啟所有社團">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                全部開啟
            </button>
            <button id="dashboardBtn" class="btn btn-action" title="開啟儀表板">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="9" y1="3" x2="9" y2="21" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                </svg>
                儀表板
            </button>
        </div>

        <!-- 功能開關區 -->
        <div class="toggles-section">
            <!-- 過濾開關 -->
            <div class="filter-toggle">
                <span class="filter-label">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M1 1h22l-8.5 10v7l-5 3V11L1 1z" />
                    </svg>
                    社團動態過濾
                </span>
                <label class="switch">
                    <input type="checkbox" id="filterToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- 自動滾動開關 -->
            <div class="filter-toggle" style="flex-direction: column; align-items: stretch; gap: 8px;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <span class="filter-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                            height="16">
                            <path d="M12 5v14M5 12l7 7 7-7" />
                        </svg>
                        自動滾動
                    </span>
                    <label class="switch">
                        <input type="checkbox" id="autoScrollToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div
                    style="display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-secondary); padding-top: 4px; border-top: 1px dashed var(--border);">
                    <span>滾動間隔 (秒):</span>
                    <input type="number" id="scrollIntervalInput" min="1" max="60" value="1"
                        style="width: 50px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-primary); color: var(--text-primary); text-align: center;">
                </div>
            </div>

            <!-- 自動發送開關 -->
            <div class="filter-toggle" style="flex-direction: column; align-items: stretch; gap: 8px;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <span class="filter-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                            height="16">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                        自動發送 Discord
                    </span>
                    <label class="switch">
                        <input type="checkbox" id="autoSendToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div
                    style="display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text-secondary); padding-top: 4px; border-top: 1px dashed var(--border);">
                    <span>🔗 Discord Webhook 網址:</span>
                    <div style="display: flex; gap: 4px; align-items: center; width: 100%;">
                        <input type="password" id="webhookUrlInput" placeholder="貼上 https://discord.com/api/webhooks/..."
                            style="flex: 1; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-primary); color: var(--text-primary); font-size: 12px; box-sizing: border-box; height: 26px;">
                        <button type="button" id="toggleWebhookVisibility" style="background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; height: 26px; font-size: 12px;">
                            👁️
                        </button>
                    </div>
                </div>
                <div
                    style="display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text-secondary); padding-top: 4px; border-top: 1px dashed var(--border);">
                    <span>🔔 關鍵字提醒 (符合時加 @everyone，用 ; 分隔):</span>
                    <input type="text" id="alertKeywordsInput" placeholder="例如: 4070;14700"
                        style="width: 100%; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-primary); color: var(--text-primary); font-size: 12px; box-sizing: border-box;">
                </div>
            </div>

            <!-- 自動刷新開關 -->
            <div class="filter-toggle" style="flex-direction: column; align-items: stretch; gap: 8px;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <span class="filter-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                            height="16">
                            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-12.28l5.67 5.67" />
                        </svg>
                        自動重新整理
                    </span>
                    <label class="switch">
                        <input type="checkbox" id="autoRefreshToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div
                    style="display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-secondary); padding-top: 4px; border-top: 1px dashed var(--border);">
                    <span>刷新間隔 (秒):</span>
                    <input type="number" id="refreshIntervalInput" min="5" max="3600" value="30"
                        style="width: 50px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-primary); color: var(--text-primary); text-align: center;">
                </div>
            </div>
        </div>

        <!-- 社團列表 -->
        <div class="group-list" id="groupList">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 00-3-3.87" />
                    <path d="M16 3.13a4 4 0 010 7.75" />
                </svg>
                <p>還沒有新增任何社團</p>
                <p class="hint">貼上 Facebook 社團網址開始使用</p>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
